services:
  main_app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../:/app
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      REACT_APP_API_URL: "http://localhost:3001"
      CI: "true"
      WDS_SOCKET_PORT: "0"
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
      BROWSER: "none"
    command: sh -c "npm install --legacy-peer-deps && npm start"
