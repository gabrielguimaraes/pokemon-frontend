version: '3.8'

services:
  pokemon-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:3001
    image: pokemon-frontend:latest
    container_name: pokemon-frontend
    ports:
      - "3000:80"
    depends_on:
      pokemon-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  pokemon-backend:
    build:
      context: ../pokemon-backend
      dockerfile: Dockerfile
    image: pokemon-backend:latest
    container_name: pokemon-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: pokemon-network
